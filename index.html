    <title>ALT Blogger | Create & Explore</title>
  <meta name="description" content="A modern platform for bloggers to create and share insightful content.">

    <meta property="og:type" content="website">

    <meta property="twitter:card" content="summary_large_image">

    <meta property="twitter:image" content="https://altblogger.vercel.app/og-image.jpg">
